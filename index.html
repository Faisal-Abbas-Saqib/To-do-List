<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHORE-OS v2.4.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Share Tech Mono',monospace;
  min-height:100vh;
  background:#000;
  color:#33ff33;
  padding:20px 12px 48px;
  background-image:repeating-linear-gradient(0deg,rgba(0,0,0,0.15) 0px,rgba(0,0,0,0.15) 1px,transparent 1px,transparent 2px);
}

body::before{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,255,0,0.015) 0px,rgba(0,255,0,0.015) 1px,transparent 1px,transparent 3px);
  pointer-events:none;z-index:0;
  animation:scanroll 8s linear infinite;
}

@keyframes scanroll{from{background-position:0 0}to{background-position:0 100%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes typeIn{from{max-height:0;opacity:0}to{max-height:100px;opacity:1}}

.page{position:relative;z-index:1;max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:16px}

.hdr{padding:0 4px;animation:fadeIn .4s ease both}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.hdr-dot{width:10px;height:10px;border-radius:50%;background:#33ff33;box-shadow:0 0 8px #33ff33;animation:blink 1.5s infinite}
.hdr-sys{font-size:11px;color:#33ff3388;letter-spacing:2px;text-transform:uppercase}
.hdr-title{font-size:clamp(26px,8vw,46px);font-weight:700;color:#33ff33;text-shadow:0 0 10px #33ff3388,0 0 30px #33ff3333;letter-spacing:3px;line-height:1}
.hdr-sub{font-size:11px;color:#33ff3366;letter-spacing:2px;margin-top:4px}
.cursor{display:inline-block;background:#33ff33;width:10px;height:2px;vertical-align:middle;margin-left:2px;animation:blink .8s infinite}

.term{
  background:#050f05;
  border:1px solid #33ff3344;
  border-radius:4px;
  box-shadow:0 0 0 1px #33ff3311,0 0 20px rgba(51,255,51,0.1),inset 0 0 30px rgba(0,0,0,0.5);
  padding:0;
  animation:fadeIn .4s ease both;
  overflow:hidden;
}
.term:nth-child(2){animation-delay:.1s}
.term:nth-child(3){animation-delay:.2s}

.term-bar{
  background:#0a1a0a;
  border-bottom:1px solid #33ff3322;
  padding:7px 14px;
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:#33ff3366;letter-spacing:2px;
}
.term-bar-dot{width:7px;height:7px;border-radius:50%;background:#33ff3344;border:1px solid #33ff3366}
.term-bar-dot.g{background:#33ff33;box-shadow:0 0 6px #33ff33}
.term-bar-title{flex:1;text-align:center;letter-spacing:3px}
.term-body{padding:18px 16px}

.prompt-row{
  display:flex;align-items:center;gap:0;margin-bottom:10px;
  border:1px solid #33ff3344;background:#000;border-radius:2px;overflow:hidden;
  flex-wrap:nowrap;
}
.prompt-sym{
  padding:0 8px;color:#33ff33;font-size:14px;
  border-right:1px solid #33ff3322;height:42px;
  display:flex;align-items:center;flex-shrink:0;background:#0a1a0a;
  white-space:nowrap;
}

#chore{
  flex:1;min-width:0;height:42px;padding:0 10px;
  font-family:'Share Tech Mono',monospace;font-size:13px;
  color:#33ff33;background:transparent;border:none;outline:none;
  caret-color:#33ff33;
}
#chore::placeholder{color:#33ff3333}
#chore:focus{background:rgba(51,255,51,0.03)}

.btn-add,.btn-reset{
  height:42px;padding:0 14px;
  font-family:'Share Tech Mono',monospace;font-size:12px;font-weight:700;
  border:none;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
  letter-spacing:1px;touch-action:manipulation;
}
.btn-add{background:#33ff33;color:#000;border-left:1px solid #33ff3344}
.btn-add:hover{background:#55ff55;box-shadow:0 0 12px #33ff3366}
.btn-reset{background:transparent;color:#33ff3366;border-left:1px solid #33ff3322}
.btn-reset:hover{color:#ff3333;background:rgba(255,51,51,0.08)}
.btn-add:active,.btn-reset:active{transform:scale(.96)}

#empty{font-size:11px;color:#ff3333;min-height:16px;margin-bottom:4px;letter-spacing:1px;word-break:break-word}
#empty:not(:empty)::before{content:'[ERR] '}
#refresh{font-size:11px;color:#33ff33;min-height:16px;margin-bottom:4px;letter-spacing:1px;word-break:break-word}
#refresh:not(:empty)::before{content:'[OK]  '}

h2{
  font-family:'Share Tech Mono',monospace;font-size:12px;font-weight:700;
  color:#33ff3388;letter-spacing:3px;text-transform:uppercase;
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid #33ff3322;
  display:flex;align-items:center;gap:8px;
}
h2::before{content:'##';color:#33ff3344}

ul{list-style:none;display:flex;flex-direction:column;gap:6px;margin-top:2px}
ul:empty::after{
  content:'> NO TASKS FOUND_';color:#33ff3333;font-size:12px;
  display:block;padding:12px 0 4px;letter-spacing:2px;animation:blink 1.5s infinite;
}

li{
  display:flex;align-items:center;gap:8px;
  border:1px solid #33ff3322;background:#000;
  border-radius:2px;padding:9px 10px;
  transition:all .15s;min-width:0;overflow:hidden;
  animation:typeIn .2s ease both;
  flex-wrap:nowrap;
}
li::before{content:'>';color:#33ff3366;flex-shrink:0;font-size:13px}
li:hover{border-color:#33ff3366;background:#0a1a0a;box-shadow:0 0 8px rgba(51,255,51,0.08)}

li input{
  flex:1;min-width:0;border:none;background:transparent;
  font-family:'Share Tech Mono',monospace;font-size:13px;
  color:#33ff33;outline:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
li input[readonly]{color:#33ff33cc;cursor:default}
li input:not([readonly]){color:#fff;caret-color:#33ff33;background:rgba(51,255,51,0.05);padding:0 4px}

li button{
  width:28px;height:28px;min-width:28px;max-width:28px;
  border-radius:2px;border:1px solid;background:transparent;cursor:pointer;
  font-size:13px;display:flex;align-items:center;justify-content:center;
  transition:all .12s;flex-shrink:0;touch-action:manipulation;
  font-family:'Share Tech Mono',monospace;line-height:1;
}
li button:hover{transform:scale(1.1)}
li button:active{transform:scale(.92)}

li button.btn-edit{border-color:#ffc80066;color:#ffc800}
li button.btn-edit:hover{background:rgba(255,200,0,.15);box-shadow:0 0 6px rgba(255,200,0,.3)}
li button.btn-done{border-color:#33ff3366;color:#33ff33}
li button.btn-done:hover{background:rgba(51,255,51,.15);box-shadow:0 0 6px rgba(51,255,51,.3)}
li button.btn-del{border-color:#ff333366;color:#ff3333}
li button.btn-del:hover{background:rgba(255,51,51,.15);box-shadow:0 0 6px rgba(255,51,51,.3)}

#myList2 li{opacity:.45;filter:saturate(.3)}
#myList2 li input[readonly]{text-decoration:line-through;color:#33ff3366}
#myList2 li::before{content:'✓';color:#33ff3344}

/* ── RESPONSIVE ── */
@media(max-width:380px){
  body{padding:12px 8px 40px}
  .term-body{padding:12px 10px}
  .hdr-title{font-size:22px}
  #chore{height:38px;font-size:11px;padding:0 6px}
  .btn-add,.btn-reset{height:38px;padding:0 10px;font-size:11px}
  li{padding:8px 8px;gap:5px}
  li input{font-size:12px}
  li button{width:24px;height:24px;min-width:24px;max-width:24px;font-size:11px}
}

@media(min-width:560px){
  body{padding:36px 24px 64px}
  .term-body{padding:22px 22px}
  .hdr-title{font-size:48px}
  li{padding:10px 12px}
  li input{font-size:14px}
  li button{width:30px;height:30px;min-width:30px;max-width:30px}
}

@media(min-width:768px){
  body{padding:48px 32px 80px}
  .hdr-title{font-size:52px}
  .page{max-width:580px}
}

@media(min-width:1024px){
  body{padding:56px 48px 100px}
  .page{max-width:620px}
  .term-body{padding:26px 28px}
  h2{font-size:13px}
  li{padding:11px 14px}
}

@media(min-width:1440px){
  body{padding:72px 64px 120px}
  .page{max-width:660px}
}
</style>
</head>
<body>
<div class="page">

  <header class="hdr">
    <div class="hdr-top">
      <div class="hdr-dot"></div>
      <span class="hdr-sys">CHORE-OS v2.4.1</span>
    </div>
    <div class="hdr-title">$ CHORE<div class="cursor"></div></div>
    <div class="hdr-sub">TASK MANAGEMENT TERMINAL // READY</div>
  </header>

  <div class="term">
    <div class="term-bar">
      <div class="term-bar-dot g"></div>
      <div class="term-bar-dot"></div>
      <div class="term-bar-dot"></div>
      <span class="term-bar-title">INPUT.exe</span>
    </div>
    <div class="term-body">
      <div class="prompt-row">
        <span class="prompt-sym">$&gt;</span>
        <input id="chore" placeholder="type new task and press [ENTER]">
        <button class="btn-add" onclick="myFunction()">RUN</button>
        <button class="btn-reset" onclick="reset()">CLR</button>
      </div>
      <p id="empty"></p>
      <p id="refresh"></p>
      <h2>PENDING TASKS</h2>
      <ul id="myList"></ul>
    </div>
  </div>

  <div class="term">
    <div class="term-bar">
      <div class="term-bar-dot g"></div>
      <div class="term-bar-dot"></div>
      <div class="term-bar-dot"></div>
      <span class="term-bar-title">COMPLETED.log</span>
    </div>
    <div class="term-body">
      <h2>COMPLETED TASKS</h2>
      <ul id="myList2"></ul>
    </div>
  </div>

</div>
<script src="code.js"></script>
</body>
</html>
