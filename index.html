<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chore List</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <div class="page-wrap">
      <header class="app-header">
        <h1 class="app-title">Chore<span>.</span></h1>
        <p class="app-subtitle">Track what needs doing</p>
      </header>
    </div>
    <div>
        <div class="input-row">
            <input id="chore" placeholder="Add a new chore…">
            <button onclick="myFunction()">Add</button>
            <button onclick="reset()">Reset</button>
        </div>
        <p id="empty"></p>
        <p id="refresh"></p>
        <h2>To Do</h2>
        <ul id="myList"></ul>
    </div>
    <div>
        <h2>Done</h2>
        <ul id="myList2"></ul>
    </div>
    <script src="code.js"></script>
</body>
</html>
